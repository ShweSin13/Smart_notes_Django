<!DOCTYPE html>
<html>
<head>
    <title>{{ note.title }}</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        .box {
            max-width: 700px;
            margin: auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        a {
            color: #38bdf8;
            text-decoration: none;
        }

        .back {
            display: inline-block;
            margin-bottom: 15px;
            color: #38bdf8;
        }

        h1 {
            color: #f8fafc;
            margin-bottom: 10px;
        }

        .content {
            margin-top: 20px;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .tag {
            display: inline-block;
            background: #334155;
            padding: 5px 10px;
            border-radius: 8px;
            margin: 3px;
            font-size: 12px;
            color: #38bdf8;
            text-decoration: none;
            transition: 0.2s;
        }

        .tag:hover {
            background: #475569;
        }

        .section-title {
            color: #38bdf8;
            margin-top: 20px;
        }

        hr {
            border: 1px solid #334155;
            margin: 20px 0;
        }

        /* ===== ACTION BUTTONS ===== */
        .actions {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
        }

        .edit-btn {
            background: #38bdf8;
            color: #0f172a;
        }

        .edit-btn:hover {
            background: #0ea5e9;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

    </style>
</head>

<body>

<div class="box">

    <a href="/" class="back">← Back</a>

    <!-- ACTION BUTTONS -->
    <div class="actions">

        <a href="{% url 'edit_note' note.id %}" class="btn edit-btn">
            ✏️ Edit
        </a>

        <a href="{% url 'delete_note' note.id %}" class="btn delete-btn"
           onclick="return confirm('Are you sure you want to delete this note?');">
            🗑 Delete
        </a>

    </div>

    <h1>{{ note.title }}</h1>

    <!-- CONTENT -->
    <div class="content">
        {{ note.get_linked_content|safe }}
    </div>

    <hr>

    <!-- RELATED -->
    <h3 class="section-title">Related Notes</h3>

    {% for related in note.get_related_notes %}
        <span class="tag">{{ related.title }}</span>
    {% empty %}
        <p style="color:#94a3b8;">No related notes</p>
    {% endfor %}

    <hr>

    <!-- TAGS -->
    <h3 class="section-title">Tags</h3>

    {% for tag in note.get_tags %}
        <a href="{% url 'notes_by_tag' tag %}" class="tag">
            #{{ tag }}
        </a>
    {% empty %}
        <p style="color:#94a3b8;">No tags found</p>
    {% endfor %}

</div>

</body>
</html>
